<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Limited Media Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 700px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b1e;
      color: #cdd6f4;
      display: flex;
    }

    /* Left panel: groups */
    .groups-panel {
      width: 280px;
      min-width: 280px;
      background: #12122b;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
    }
    .groups-header {
      padding: 10px 12px;
      border-bottom: 1px solid #313244;
      font-size: 13px;
      font-weight: bold;
    }
    .new-group-form {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid #313244;
      flex-wrap: wrap;
    }
    .new-group-form input {
      flex: 1;
      border: none;
      border-radius: 4px;
      background: #1e1e3a;
      color: #cdd6f4;
      padding: 5px 8px;
      font-size: 12px;
      min-width: 80px;
    }
    .new-group-form select {
      border: none;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      padding: 5px 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .new-group-form button {
      border: none;
      border-radius: 4px;
      background: #a6e3a1;
      color: #0b0b1e;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    .group-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .group-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 2px;
    }
    .group-item:hover { background: #1e1e3a; }
    .group-item.active { background: #313244; color: #f5c2e7; }
    .group-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-item-type {
      width: 50px;
      font-size: 9px;
      background: #313244;
      color: #cba6f7;
      padding: 2px 4px;
      text-align: center;
      border-radius: 3px;
      cursor: pointer;
    }
    .group-item-count { color: #a6adc8; font-size: 11px; }
    .group-item-delete {
      background: none; border: none; color: #f38ba8; cursor: pointer;
      font-size: 12px; opacity: 0; padding: 0 4px;
    }
    .group-item:hover .group-item-delete { opacity: 1; }

    /* Right panel: content */
    .content-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Top toolbar */
    .toolbar {
      padding: 6px 10px;
      background: #18183e;
      border-bottom: 1px solid #313244;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .toolbar button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      background: #313244;
      color: #cdd6f4;
    }
    .toolbar button:hover { background: #45475a; }
    .toolbar button.paused { background: #fab387; color: #0b0b1e; }
    .toolbar button.export-btn { background: #cba6f7; color: #0b0b1e; font-weight: bold; }
    .toolbar button.search-media-btn { background: #89b4fa; color: #0b0b1e; font-weight: bold; }
    .toolbar button.clear-btn { background: #f38ba8; color: #0b0b1e; }

    /* Summary bar */
    .summary {
      padding: 3px 10px;
      background: #11112a;
      border-bottom: 1px solid #313244;
      font-size: 10px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }
    .summary span { color: #a6adc8; }
    .summary strong { color: #f5c2e7; }

    /* Main table */
    .table-container {
      flex: 1;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    thead { position: sticky; top: 0; z-index: 1; }
    th {
      background: #313244;
      padding: 5px 8px;
      text-align: left;
      font-weight: 600;
      color: #bac2de;
      border-bottom: 2px solid #45475a;
      white-space: nowrap;
    }
    td {
      padding: 3px 8px;
      border-bottom: 1px solid #222244;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:hover td { background: #31324477; }
    .url-cell { max-width: 450px; font-family: 'Consolas', monospace; color: #a6e3a1; font-size: 10px; cursor: pointer; }
    .origin-cell { max-width: 200px; color: #89b4fa; font-size: 10px; }
    .referer-cell { max-width: 200px; color: #f5c2e7; font-size: 10px; }
    .type-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
    .media-type-cell { width: 80px; }

    .cat-STREAM   { background: #cba6f744; color: #cba6f7; }
    .cat-SUBTITLE { background: #89dceb44; color: #89dceb; }
    .cat-SEGMENT  { background: #fab38744; color: #fab387; }
    .cat-Videos   { background: #f38ba844; color: #f38ba8; }
    .cat-AUDIO    { background: #94e2d544; color: #94e2d5; }
    .cat-MEDIA    { background: #fab38744; color: #fab387; }
    .cat-IMAGE    { background: #a6e3a144; color: #a6e3a1; }
    .cat-XHR      { background: #94e2d544; color: #94e2d5; }
    .cat-FETCH    { background: #74c7ec44; color: #74c7ec; }
    .cat-DOCUMENT { background: #cba6f744; color: #cba6f7; }

    .status-ok   { color: #a6e3a1; }
    .status-error { color: #f38ba8; font-weight: bold; }

    /* Search/media overlay */
    .search-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(11,11,30,0.92);
      z-index: 100;
      flex-direction: column;
    }
    .search-overlay.active { display: flex; }
    .search-bar {
      padding: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    .search-bar input {
      width: 600px;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #1e1e3a;
      color: #cdd6f4;
      font-size: 14px;
    }
    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
    }
    .search-result-item {
      display: flex;
      gap: 8px;
      padding: 6px 10px;
      align-items: center;
      background: #1e1e3a;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .search-result-item:hover { background: #2a2a50; cursor: pointer; }
    .search-result-url { flex: 1; font-family: 'Consolas', monospace; color: #a6e3a1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-result-type { width: 80px; text-align: right; }

    /* Empty states */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }
    .empty-state.active { display: flex; }
    .empty-state p { color: #a6adc8; font-size: 13px; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #18183e;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .tab {
      padding: 6px 14px;
      cursor: pointer;
      font-size: 11px;
      color: #a6adc8;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: #cba6f7; border-bottom-color: #cba6f7; }
    .tab:hover { color: #cdd6f4; }

    /* Media search list in groups panel */
    .media-search-section {
      border-top: 1px solid #313244;
      max-height: 300px;
      overflow-y: auto;
    }
    .media-search-header {
      padding: 6px 10px;
      font-size: 11px;
      color: #89b4fa;
      background: #1a1a2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .media-search-header button {
      background: none; border: none; color: #cba6f7; cursor: pointer; font-size: 10px;
    }
    .media-item-row {
      padding: 4px 10px;
      font-size: 10px;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .media-item-url { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #a6e3a1; font-family: 'Consolas', monospace; }
    .media-select-btn {
      padding: 2px 6px; font-size: 9px; border: none; border-radius: 3px;
      background: #313244; color: #cdd6f4; cursor: pointer; white-space: nowrap;
    }
    .media-select-btn:hover { background: #45475a; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #45475a; }
  </style>
</head>
<body>
  <div class="groups-panel">
    <div class="groups-header">📦 Groups</div>
    <div class="new-group-form">
      <input type="text" id="newGroupInput" placeholder="e.g. S01E01, Episode_03..." />
      <select id="newGroupType">
        <option value="m3u8_vtt">Manifest (m3u8/vtt)</option>
        <option value="file">File</option>
      </select>
      <button id="addGroupBtn">+ Add</button>
    </div>
    <div class="group-list" id="groupList"></div>
    
    <!-- Unassigned media items -->
    <div class="media-search-section" id="mediaSearchSection" style="display: none;">
      <div class="media-search-header">
        <span title="Unmatched media found in recent requests">📡 Unmatched Media</span>
        <button id="searchMediaBtn2">Refresh</button>
      </div>
      <div id="mediaSearchList"></div>
    </div>
  </div>

  <div class="content-panel">
    <div class="tabs">
      <div class="tab active" data-view="all" onclick="switchView('all', this)">All Requests</div>
      <div class="tab" data-view="media" onclick="switchView('media', this)">🎬 Media Only</div>
    </div>

      <button id="pauseBtn" class="clear-btn toolbar-btn">⏸ Pause</button>
      <span style="flex:1"></span>
      <select id="filterSelect">
        <option value="all">All Types</option>
        <option value="STREAM">Manifest (m3u8/mpd)</option>
        <option value="SUBTITLE">Subtitles (VTT)</option>
        <option value="SEGMENT">Segments (.ts/m4s)</option>
        <option value="VIDEO">Video</option>
        <option value="IMAGE">Image</option>
        <option value="XHR">XHR</option>
      </select>
      <button id="clearLogBtn" class="clear-btn">🗑 Clear Requests</button>
      <span style="flex:1"></span>
      <input type="text" id="searchInput" placeholder="Filter URL/origin..." style="width: 200px; padding: 4px 8px; border-radius: 4px; border: none; background: #313244; color: #cdd6f4; font-size: 11px;">
      <button id="exportAllBtn" class="export-btn" title="Export all groups">📤 Export JSON</button>
    </div>

    <div class="summary" id="summary"></div>

    <div class="table-container">
      <!-- Group content view -->
      <div id="groupView" style="display: none;">
        <h3 id="groupTitle" style="padding: 6px 10px; font-size: 12px; color: #cba6f7;"></h3>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Status</th>
              <th>Method</th>
              <th>URL</th>
              <th>Origin URL</th>
              <th>Referer</th>
            </tr>
          </thead>
          <tbody id="groupLogBody"></tbody>
        </table>
      </div>

      <!-- All requests view -->
      <div id="allView">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Status</th>
              <th>Method</th>
              <th>URL</th>
              <th>Origin URL</th>
              <th>Referer</th>
            </tr>
          </thead>
          <tbody id="allLogBody"></tbody>
        </table>
      </div>

      <!-- Empty states -->
      <div class="empty-state" id="noRequestsState">
        <p>No requests captured yet.</p>
        <p style="font-size: 11px; color: #a6adc8;">Requests appear here as you browse.</p>
      </div>
    </div>

    <!-- Group detail media breakdown -->
    <div id="groupMediaBreakdown" style="display: none; border-top: 1px solid #313244; background: #0f0f23;">
      <h3 style="padding: 8px 10px; font-size: 12px; color: #cba6f7;">Media Assets by Type</h3>
      <div id="mediaBreakdownContent" style="padding: 4px 10px; font-size: 11px;"></div>
    </div>
  </div>

  <!-- Media search overlay -->
  <div class="search-overlay" id="mediaSearchOverlay">
    <div class="search-bar">
      <span style="font-size: 14px; font-weight: bold;">🔍 Find Unassigned Media</span>
      <input type="text" id="urlFilterInput" placeholder="Filter URL pattern (e.g. m3u8, episode03)...">
      <button onclick="document.getElementById('mediaSearchOverlay').classList.remove('active')" style="padding: 8px 16px; border: none; border-radius: 6px; background: #f38ba8; color: #0b0b1e; font-size: 12px;">Close</button>
    </div>
    <div class="search-results" id="mediaSearchResults"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
